name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Show versions
        run: |
          node --version
          npm --version
          java -version
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps --no-audit --no-fund
          ls node_modules/@capacitor/ || echo "No capacitor folder!"

      - name: Inject production API URL
        run: |
          API_URL="${{ vars.PROD_API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://legalease-api.onrender.com"
          fi
          echo "Using API URL: $API_URL"
          python3 -c "
import re
p = open('frontend/index.html').read()
p = re.sub(r'window.__LEGALEASE_PROD_API__ = \"[^\"]*\";', 'window.__LEGALEASE_PROD_API__ = \"$API_URL\";', p)
open('frontend/index.html','w').write(p)
print('Injected URL into index.html')
"

      - name: Add Android platform
        run: |
          if [ -d "android" ]; then
            echo "android folder exists, removing for clean build"
            rm -rf android
          fi
          npx cap add android

      - name: Sync frontend into native project
        run: npx cap sync android

      - name: Patch AndroidManifest with permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          python3 << 'EOF'
import re
with open('android/app/src/main/AndroidManifest.xml') as f:
    p = f.read()
perms = ['INTERNET', 'ACCESS_NETWORK_STATE', 'RECORD_AUDIO', 'MODIFY_AUDIO_SETTINGS', 'CALL_PHONE']
to_add = ''
for perm in perms:
    if f'android.permission.{perm}' not in p:
        to_add += f'    <uses-permission android:name="android.permission.{perm}" />\n'
if to_add:
    p = p.replace('<application', to_add + '    <application', 1)
with open('android/app/src/main/AndroidManifest.xml', 'w') as f:
    f.write(p)
print('Manifest patched')
EOF
          cat "$MANIFEST"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode all

      - name: Locate APK
        run: |
          find android -name "*.apk" -type f
          mkdir -p dist
          APK=$(find android -name "app-debug.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found!"
            exit 1
          fi
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp "$APK" "dist/LegalEase-Pro-build${{ github.run_number }}-${SHORT_SHA}.apk"
          ls -lh dist/

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LegalEase-Pro-APK
          path: dist/*.apk
          retention-days: 90
          if-no-files-found: warn

      - name: Create GitHub Release with APK
        if: success() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "LegalEase Pro Build #${{ github.run_number }}"
          body: |
            Auto-built APK from commit `${{ github.sha }}`.

            **Install on phone:**
            1. Download `LegalEase-Pro-*.apk` below.
            2. Open on phone, allow "Install from unknown sources".
            3. Open app, complete onboarding + login.
          files: dist/*.apk
          prerelease: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
