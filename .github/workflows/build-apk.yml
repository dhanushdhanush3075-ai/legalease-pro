name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write     # needed to create releases

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 platform-tools"

      - name: Install Capacitor + plugins
        run: |
          echo "Installing npm dependencies..."
          npm install --no-audit --no-fund
          npx cap --version

      - name: Bake production API URL into frontend
        run: |
          API_URL="${{ vars.PROD_API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://legalease-api.onrender.com"
          fi
          echo "Using API URL: $API_URL"
          sed -i.bak "s|window.__LEGALEASE_PROD_API__ = \"\";|window.__LEGALEASE_PROD_API__ = \"$API_URL\";|g" frontend/index.html
          grep "__LEGALEASE_PROD_API__" frontend/index.html || true

      - name: Add Android platform (only if missing)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "android folder already exists, skipping cap add"
          fi

      - name: Sync web -> native
        run: npx cap sync android

      - name: Patch AndroidManifest with permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          echo "Before patch:"
          cat "$MANIFEST"
          for PERM in INTERNET ACCESS_NETWORK_STATE RECORD_AUDIO MODIFY_AUDIO_SETTINGS CALL_PHONE; do
            if ! grep -q "android.permission.${PERM}" "$MANIFEST"; then
              # Insert permission before <application
              python3 -c "
import sys, re
p = open('$MANIFEST').read()
perm = '    <uses-permission android:name=\"android.permission.${PERM}\" />\n'
p = p.replace('<application', perm + '    <application', 1)
open('$MANIFEST', 'w').write(p)
"
            fi
          done
          echo "After patch:"
          cat "$MANIFEST"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK with build number
        run: |
          mkdir -p dist
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             dist/LegalEase-Pro-build${{ github.run_number }}-${SHORT_SHA}.apk
          ls -lh dist/

      - name: Upload APK as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LegalEase-Pro-APK
          path: dist/*.apk
          retention-days: 90
          if-no-files-found: warn

      - name: Create GitHub Release with APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "LegalEase Pro Build #${{ github.run_number }}"
          body: |
            Auto-built APK from commit `${{ github.sha }}`.

            **Install on phone:**
            1. Download `LegalEase-Pro-*.apk` below.
            2. Open on phone, allow "Install from unknown sources".
            3. Open app, complete onboarding + login.
          files: dist/*.apk
          prerelease: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
